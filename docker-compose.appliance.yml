# Appliance overlay — Phase 29.
# Reuses shared Postgres / Redis / Vibe Shield / LLM gateway from the
# vibe appliance. Operators run:
#   docker compose -f docker-compose.appliance.yml up -d
# alongside the appliance's own compose file.

x-api-env: &api-env
  NODE_ENV: production
  PORT: 4000
  DATABASE_URL: ${VIBETC_DATABASE_URL:?DATABASE_URL must be set in appliance env}
  REDIS_URL: ${VIBETC_REDIS_URL:?REDIS_URL must be set}
  VIBE_SHIELD_URL: ${VIBE_APPLIANCE_VIBE_SHIELD_URL:?shared Vibe Shield gateway URL required}
  VIBE_SHIELD_API_KEY: ${VIBETC_VIBE_SHIELD_API_KEY:?Vibe Shield tenant key (vs_live_…) required}
  VIBE_SHIELD_POLICY: ${VIBE_SHIELD_POLICY:-cpa-converter-output}
  LLM_GATEWAY_URL: ${VIBE_APPLIANCE_LLM_GATEWAY_URL:?shared LLM gateway URL required}
  LLM_PROVIDER: local
  LLM_MODEL_ID: qwen3-8b
  SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET must be set}
  # The appliance installer derives this from `routes[0].host` in
  # vibe-app.yaml (e.g. https://tx.<appliance-domain>) and threads it in
  # so the API CORS allowlist matches the SPA's actual origin. Bare
  # overlay deploys without the installer must set it explicitly — fail
  # loudly here rather than silently 403 every CORS request.
  WEB_BASE_URL: ${WEB_BASE_URL:?WEB_BASE_URL must be set (e.g. https://tx.<appliance-domain>)}
  DATA_DIR: /var/lib/vibetc
  WORKER_INLINE: 'true'
  APPLIANCE_MODE: 'true'
  APPLIANCE_VERSION: ${APPLIANCE_VERSION:-1}

services:
  api:
    # Pull the published, signed, multi-arch image by default. Operators
    # who actually want to build locally can override with a sibling
    # docker-compose.appliance.local-build.yml (or just compose -f).
    image: ghcr.io/kisaesdevlab/vibe-tx-converter:${VIBETC_IMAGE_TAG:-latest}
    pull_policy: always
    environment:
      <<: *api-env
      # The full vibe-installer flow runs migrations as a separate step
      # (see vibe-app.yaml `migrations.command`). Bare-overlay deploys
      # have no such step, so the api auto-migrates on boot — drizzle
      # migrations are idempotent, so installer + auto-migrate is safe
      # together.
      MIGRATIONS_AUTO: 'true'
    networks:
      - vibe-appliance
    volumes:
      - vibetc-data:/var/lib/vibetc
    # Health is also wired into the Dockerfile's HEALTHCHECK; reflect it
    # here so the appliance orchestrator's compose-level checks pass.
    healthcheck:
      test: ['CMD', 'curl', '-fsS', 'http://localhost:4000/api/health/live']
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    restart: unless-stopped

networks:
  vibe-appliance:
    external: true
    name: vibe-appliance

volumes:
  vibetc-data:
