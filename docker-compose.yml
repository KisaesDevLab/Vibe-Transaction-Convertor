# Standalone deployment — Phase 28.
# Brings up Postgres + Redis + Ollama + Caddy + a separate worker container
# alongside the API. OCR + extraction run locally on Ollama (Qwen text model
# + a Qwen-VL vision model); page images never leave the host (ADR-023).
# Operators run
#   docker compose --profile standalone up -d
# then pull the models:  docker compose exec ollama ollama pull qwen3.5:35b-a3b

x-api-env: &api-env
  NODE_ENV: production
  PORT: 4000
  DATABASE_URL: postgres://vibetc:vibetc@postgres:5432/vibetc?schema=vibetc
  REDIS_URL: redis://redis:6379
  # Local Ollama model server — OCR (vision) + text extraction. No egress.
  OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
  LLM_PROVIDER: local
  LLM_MODEL_ID: ${LLM_MODEL_ID:-qwen3.5:35b-a3b}
  # Vision model = the CHECK-PAYEE FALLBACK only (ADR-025). Scanned-page OCR
  # runs on GLM-OCR (below), not Ollama. Defaults to qwen3-vl:30b when unset;
  # pull it on the Ollama host: `docker compose exec ollama ollama pull qwen3-vl:30b`.
  OLLAMA_VISION_MODEL: ${OLLAMA_VISION_MODEL:-}
  # Local GLM-OCR llama-server (ADR-025) — transcribes scanned statement pages
  # + cancelled checks. On-appliance only; page images never egress. Required
  # for scanned OCR (unset ⇒ scanned extraction fails fast). Operators with an
  # EXISTING GLM-OCR server just set GLM_OCR_URL to it (e.g. http://<host>:8082)
  # and can ignore the bundled glm-ocr service below.
  GLM_OCR_URL: ${GLM_OCR_URL:-http://glm-ocr:8082}
  # VibeOCR (ADR-026) — the PDF-native OCR engine (the whole PDF is uploaded once
  # and OCR'd server-side; it fronts GLM-OCR). When set and reachable it is the
  # primary scanned-OCR path (select via the "OCR engine" admin setting / default
  # 'vibe'); on failure the worker falls back to GLM-OCR. On-appliance only.
  VIBE_OCR_URL: ${VIBE_OCR_URL:-}
  VIBE_OCR_API_KEY: ${VIBE_OCR_API_KEY:-}
  SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET must be set}
  # Default LAN install: Caddy serves plain HTTP on :80 (the Caddyfile's
  # `tls internal` block is commented out by default), so cookies must
  # not be marked Secure or browsers drop them and login becomes a 401
  # loop. CORS allowlist must agree with the actual served origin.
  # Operators flipping to TLS set both: SESSION_SECURE=true and
  # WEB_BASE_URL=https://<their-domain>.
  WEB_BASE_URL: ${WEB_BASE_URL:-http://localhost}
  SESSION_SECURE: ${SESSION_SECURE:-false}
  DATA_DIR: /var/lib/vibetc

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: vibetc
      POSTGRES_PASSWORD: vibetc
      POSTGRES_DB: vibetc
    ports:
      - '5432:5432'
    volumes:
      - vibetc-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U vibetc']
      interval: 2s
      timeout: 3s
      retries: 30

  redis:
    image: redis:7
    profiles: ['standalone']
    volumes:
      - vibetc-redis:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 2s
      timeout: 3s
      retries: 30

  # Local Ollama model server — serves the text model (OpenAI-compatible /v1)
  # and the check-payee fallback vision model (native /api/chat). Models are
  # NOT baked into the image; after `up`, pull them:
  #   docker compose exec ollama ollama pull qwen2.5:32b-instruct
  #   docker compose exec ollama ollama pull qwen3-vl:30b            # check-payee vision
  # For GPU acceleration add a `deploy.resources.reservations.devices` NVIDIA
  # block (host needs the NVIDIA container toolkit); CPU-only works but is slow.
  ollama:
    image: ollama/ollama:latest
    profiles: ['standalone']
    environment:
      # SERVER-side keep-alive: how long Ollama keeps a model resident after a
      # request. The OpenAI-compatible /v1 endpoint (used by text extraction)
      # IGNORES a per-request keep_alive, so this server default is the only way
      # to keep the text model warm and avoid the ~2-min cold reload on the
      # first extraction. Default 1h; "-1" = forever (more VRAM, no reloads).
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-1h}
      # SERVER-side default context window. The big extraction prompt (system +
      # exemplars + statement markdown) can exceed Ollama's stock 4096 and get
      # silently truncated — /v1 can't set num_ctx per request either, so raise
      # the server default. 8192 fits a typical statement; raise for long ones.
      OLLAMA_CONTEXT_LENGTH: ${OLLAMA_CONTEXT_LENGTH:-8192}
    volumes:
      - vibetc-ollama:/root/.ollama
    healthcheck:
      test: ['CMD-SHELL', 'ollama list >/dev/null 2>&1 || exit 1']
      interval: 5s
      timeout: 5s
      retries: 30

  # Local GLM-OCR engine (ADR-025) — llama.cpp llama-server + GLM-OCR weights,
  # OpenAI-compatible /v1/chat/completions vision. Transcribes scanned statement
  # pages (stage 1) before the text model extracts. Page images are processed
  # on-appliance and NEVER egress: there is intentionally NO `ports:` host
  # mapping — only sibling services on the compose network reach it by name
  # (http://glm-ocr:8090). GPU: add a deploy.resources NVIDIA block (and pin a
  # separate GPU from Ollama to avoid VRAM contention); CPU-only works but is
  # slow (keep GLM_OCR_TIMEOUT_MS ~120000).
  glm-ocr:
    image: kisaesdevlab/glm-ocr-server:latest
    profiles: ['standalone']
    expose:
      - '8082'
    environment:
      # Model id the server advertises — must be exactly "glm-ocr".
      OCR_MODEL: ${GLM_OCR_MODEL:-glm-ocr}
      # Output-token cap; the client fails loud on finish_reason=length.
      OCR_N_PREDICT: ${GLM_OCR_N_PREDICT:-4096}
      # Optional bearer token gate (set GLM_OCR_API_KEY in the API env too).
      OCR_API_KEY: ${GLM_OCR_API_KEY:-}
    volumes:
      - vibetc-glm-ocr:/root/.cache
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS http://localhost:8082/health || exit 1']
      interval: 30s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  api:
    build:
      context: .
      args:
        BUILD_SHA: ${BUILD_SHA:-unknown}
    profiles: ['standalone']
    environment:
      <<: *api-env
      # Worker runs in its own container; api stays request-only.
      WORKER_INLINE: 'false'
      # Auto-apply pending Drizzle migrations on api boot. Without this
      # a fresh `docker compose up` would land the api against an empty
      # postgres schema and fail /api/health/ready forever. The flag
      # lives on the api service (not the shared anchor) on purpose so
      # the worker doesn't race the api running migrations on startup.
      MIGRATIONS_AUTO: 'true'
    expose:
      - '4000'
    volumes:
      - vibetc-data:/var/lib/vibetc
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Liveness probe (matches Dockerfile HEALTHCHECK and the appliance
    # overlay) — readiness depends on Postgres/Redis/etc, which can flap
    # under restart cascades and would push the api into restart-loop
    # territory before migrations finish. Caddy still waits for this
    # service to be `healthy` via depends_on, just on liveness now.
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O - http://localhost:4000/api/health/live || exit 1']
      interval: 5s
      timeout: 5s
      retries: 30

  # Phase 28 #4: separate worker container processes BullMQ extraction
  # and maintenance jobs out-of-band from the API request path. Same image
  # as the API, just a different entry point.
  worker:
    build:
      context: .
      args:
        BUILD_SHA: ${BUILD_SHA:-unknown}
    profiles: ['standalone']
    command: ['node', 'apps/api/dist/jobs/run-worker.js']
    environment:
      <<: *api-env
      WORKER_INLINE: 'false'
    volumes:
      - vibetc-data:/var/lib/vibetc
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'pgrep -f run-worker || exit 1']
      interval: 10s
      timeout: 5s
      retries: 6

  # Phase 28 #5: Caddy fronts the API with HTTPS. Operators set the
  # public hostname in VIBETC_DOMAIN; Caddy auto-provisions a Let's
  # Encrypt cert when the domain is publicly reachable, or use the
  # tls-internal block in the Caddyfile for LAN deployments.
  caddy:
    image: caddy:2
    profiles: ['standalone']
    ports:
      - '80:80'
      - '443:443'
    environment:
      VIBETC_DOMAIN: ${VIBETC_DOMAIN:-:80}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - vibetc-caddy-data:/data
      - vibetc-caddy-config:/config
    depends_on:
      api:
        condition: service_healthy

volumes:
  vibetc-pgdata:
  vibetc-data:
  vibetc-redis:
  vibetc-ollama:
  vibetc-glm-ocr:
  vibetc-caddy-data:
  vibetc-caddy-config:
