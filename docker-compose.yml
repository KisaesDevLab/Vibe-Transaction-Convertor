# Standalone deployment — Phase 28.
# Brings up Postgres + Redis + Ollama + Caddy + a separate worker container
# alongside the API. OCR + extraction run locally on Ollama (Qwen text model
# + a Qwen-VL vision model); page images never leave the host (ADR-023).
# Operators run
#   docker compose --profile standalone up -d
# then pull the models:  docker compose exec ollama ollama pull qwen3.5:35b-a3b

x-api-env: &api-env
  NODE_ENV: production
  PORT: 4000
  DATABASE_URL: postgres://vibetc:vibetc@postgres:5432/vibetc?schema=vibetc
  REDIS_URL: redis://redis:6379
  # Local Ollama model server — OCR (vision) + text extraction. No egress.
  OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
  LLM_PROVIDER: local
  LLM_MODEL_ID: ${LLM_MODEL_ID:-qwen3.5:35b-a3b}
  # Vision/OCR model for scanned PDFs + reading check payees. Defaults to
  # minicpm-v4.5:latest (a multimodal OCR model) when unset — never the text
  # model. Override with any pulled vision tag.
  OLLAMA_VISION_MODEL: ${OLLAMA_VISION_MODEL:-}
  SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET must be set}
  # Default LAN install: Caddy serves plain HTTP on :80 (the Caddyfile's
  # `tls internal` block is commented out by default), so cookies must
  # not be marked Secure or browsers drop them and login becomes a 401
  # loop. CORS allowlist must agree with the actual served origin.
  # Operators flipping to TLS set both: SESSION_SECURE=true and
  # WEB_BASE_URL=https://<their-domain>.
  WEB_BASE_URL: ${WEB_BASE_URL:-http://localhost}
  SESSION_SECURE: ${SESSION_SECURE:-false}
  DATA_DIR: /var/lib/vibetc

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: vibetc
      POSTGRES_PASSWORD: vibetc
      POSTGRES_DB: vibetc
    ports:
      - '5432:5432'
    volumes:
      - vibetc-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U vibetc']
      interval: 2s
      timeout: 3s
      retries: 30

  redis:
    image: redis:7
    profiles: ['standalone']
    volumes:
      - vibetc-redis:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 2s
      timeout: 3s
      retries: 30

  # Local Ollama model server — serves both the text model (OpenAI-compatible
  # /v1) and the Qwen-VL vision model (native /api/chat) for OCR. Models are
  # NOT baked into the image; after `up`, pull them:
  #   docker compose exec ollama ollama pull qwen3.5:35b-a3b
  #   docker compose exec ollama ollama pull minicpm-v4.5:latest   # OCR/vision
  # For GPU acceleration add a `deploy.resources.reservations.devices` NVIDIA
  # block (host needs the NVIDIA container toolkit); CPU-only works but is slow.
  ollama:
    image: ollama/ollama:latest
    profiles: ['standalone']
    volumes:
      - vibetc-ollama:/root/.ollama
    healthcheck:
      test: ['CMD-SHELL', 'ollama list >/dev/null 2>&1 || exit 1']
      interval: 5s
      timeout: 5s
      retries: 30

  api:
    build:
      context: .
      args:
        BUILD_SHA: ${BUILD_SHA:-unknown}
    profiles: ['standalone']
    environment:
      <<: *api-env
      # Worker runs in its own container; api stays request-only.
      WORKER_INLINE: 'false'
      # Auto-apply pending Drizzle migrations on api boot. Without this
      # a fresh `docker compose up` would land the api against an empty
      # postgres schema and fail /api/health/ready forever. The flag
      # lives on the api service (not the shared anchor) on purpose so
      # the worker doesn't race the api running migrations on startup.
      MIGRATIONS_AUTO: 'true'
    expose:
      - '4000'
    volumes:
      - vibetc-data:/var/lib/vibetc
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Liveness probe (matches Dockerfile HEALTHCHECK and the appliance
    # overlay) — readiness depends on Postgres/Redis/etc, which can flap
    # under restart cascades and would push the api into restart-loop
    # territory before migrations finish. Caddy still waits for this
    # service to be `healthy` via depends_on, just on liveness now.
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O - http://localhost:4000/api/health/live || exit 1']
      interval: 5s
      timeout: 5s
      retries: 30

  # Phase 28 #4: separate worker container processes BullMQ extraction
  # and maintenance jobs out-of-band from the API request path. Same image
  # as the API, just a different entry point.
  worker:
    build:
      context: .
      args:
        BUILD_SHA: ${BUILD_SHA:-unknown}
    profiles: ['standalone']
    command: ['node', 'apps/api/dist/jobs/run-worker.js']
    environment:
      <<: *api-env
      WORKER_INLINE: 'false'
    volumes:
      - vibetc-data:/var/lib/vibetc
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'pgrep -f run-worker || exit 1']
      interval: 10s
      timeout: 5s
      retries: 6

  # Phase 28 #5: Caddy fronts the API with HTTPS. Operators set the
  # public hostname in VIBETC_DOMAIN; Caddy auto-provisions a Let's
  # Encrypt cert when the domain is publicly reachable, or use the
  # tls-internal block in the Caddyfile for LAN deployments.
  caddy:
    image: caddy:2
    profiles: ['standalone']
    ports:
      - '80:80'
      - '443:443'
    environment:
      VIBETC_DOMAIN: ${VIBETC_DOMAIN:-:80}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - vibetc-caddy-data:/data
      - vibetc-caddy-config:/config
    depends_on:
      api:
        condition: service_healthy

volumes:
  vibetc-pgdata:
  vibetc-data:
  vibetc-redis:
  vibetc-ollama:
  vibetc-caddy-data:
  vibetc-caddy-config:
