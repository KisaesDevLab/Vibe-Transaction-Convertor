# Phase 30 #5 — git-cliff config for CHANGELOG generation. Driven by
# the conventional-commit prefixes the repo uses: feat / fix / docs /
# chore / refactor / test.

[changelog]
header = """
# Changelog

All notable changes to vibe-tx-converter. Format: keepachangelog +
conventional commits.
"""
body = """
{% if version %}\
  ## [{{ version }}] — {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
  ## Unreleased
{% endif %}\

{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}

{% for commit in commits %}\
- {{ commit.message | upper_first | trim }}\
  {% if commit.scope %} *({{ commit.scope }})*{% endif %}\
  ({{ commit.id | truncate(length=7, end="") }})
{% endfor %}\
{% endfor %}\n
"""
trim = true
footer = ""

[git]
conventional_commits = true
filter_unconventional = true
commit_parsers = [
  { message = "^feat", group = "Features" },
  { message = "^fix", group = "Bug fixes" },
  { message = "^docs", group = "Documentation" },
  { message = "^test", group = "Tests" },
  { message = "^refactor", group = "Refactor" },
  { message = "^perf", group = "Performance" },
  { message = "^chore\\(release\\)", skip = true },
  { message = "^chore", group = "Chores" },
]
filter_commits = false
tag_pattern = "v[0-9]+\\.[0-9]+\\.[0-9]+"
