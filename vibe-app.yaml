# Vibe Appliance manifest (BuildPlan §29.1).
#
# Read by `vibe-installer` to install this app alongside other Vibe
# apps on a single appliance. Schema follows Vibe-Appliance v1.
#
# Hard product invariants reflected here:
# - All processing is local by default; no outbound calls at runtime.
# - The optional Anthropic provider is opt-in; no env wiring here for it
#   — the API key is set per-firm via /admin/llm-provider after install.

name: vibe-tx-converter
display_name: 'Vibe Transactions Converter'
description: 'Convert bank/credit-card PDFs to CSV/OFX/QFX/QBO files for re-import into QuickBooks, Quicken, and Xero.'
version: 0.1.0

# Pull from GHCR by default. The release workflow publishes
# linux/amd64 + linux/arm64 images signed with cosign keyless OIDC and
# attested with a syft SPDX SBOM.
image: ghcr.io/kisaesdevlab/vibe-tx-converter
image_tag_default: latest

# Owns this Postgres schema only. The shared appliance Postgres role
# must have CREATE on this schema (BuildPlan §29.6).
db_schema: vibetc

# Shared appliance services this app consumes. The appliance provisions
# them; we only point at them via env vars.
shared_services:
  - postgres
  - redis
  - glm-ocr
  - llm-gateway
  - caddy

# Appliance Caddy routes the per-app subdomain to this service.
routes:
  - host: tx.${appliance_domain}
    path: /
    service: api
    port: 4000

env:
  required:
    - DATABASE_URL # postgres://vibetc@<shared-pg>/<db>?schema=vibetc
    - REDIS_URL # redis://<shared-redis>:6379
    - GLM_OCR_URL # http://<shared-glm-ocr>:8080
    - LLM_GATEWAY_URL # http://<shared-llm-gateway>:11434
    - LLM_MODEL_ID # qwen3-8b
    - SESSION_SECRET # 32+ bytes, generated by installer
  optional:
    - LOG_LEVEL # info (default), debug, warn, error
    - MAX_UPLOAD_MB # 25 (default)
    - MAX_BATCH_SIZE # 100 (default)
    - VIBETC_FORCE_OCR # false (default) — skip text-layer detection
    - APPLIANCE_VERSION # injected by the installer

volumes:
  - name: vibetc-data
    mount: /var/lib/vibetc
    description: 'Source PDFs (content-addressed by SHA-256), rendered exports, FIDIR mirror snapshot, backups.'

# One-shot bootstrap commands the installer runs after the container is
# up but before traffic is routed.
migrations:
  command: ['node', 'apps/api/dist/db/migrate.js']

bootstrap:
  - description: 'Seed FIDIR mirror from the vendored fidir-us.txt.'
    command: ['node', 'apps/api/dist/scripts/fidir-refresh.js']
  - description: 'Verify dependencies + write self-check JSON to the orchestrator.'
    command: ['node', 'apps/api/dist/scripts/appliance-self-check.js']
    optional: true # exit-code-1 here is informational; orchestrator decides

# Operator-run uninstall, invoked by the installer when removing this
# app. The script refuses without --i-have-a-backup so a misfire of
# the orchestrator can't drop everything silently.
uninstall:
  command: ['node', 'apps/api/dist/scripts/remove-from-appliance.js', '--i-have-a-backup']

# Healthcheck the appliance orchestrator polls. Mirrors the Dockerfile
# HEALTHCHECK so compose-level and orchestrator-level both agree.
healthcheck:
  http: /api/health/live
  port: 4000
  interval_s: 30
  timeout_s: 5
  start_period_s: 15
  retries: 3

# Internal-only endpoint the appliance can call for richer health
# (queue depth, dependency latencies, build SHA). IP-restricted to the
# appliance internal network at runtime.
appliance_handshake:
  ready: /api/health/ready
  diagnostics: /api/admin/diagnostics

# License gate — PolyForm Internal Use 1.0.0 means single-firm,
# self-hosted only. Signal to the installer.
license: PolyForm-Internal-Use-1.0.0
