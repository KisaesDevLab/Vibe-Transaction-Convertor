name: Release

# Phase 30 — publishes signed multi-arch images to GHCR with cosign
# keyless signatures, syft SBOM attestations, build provenance, Trivy
# scan, and a CHANGELOG generated by git-cliff. Triggered on every tag
# matching v*.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write
  # github/codeql-action/upload-sarif needs this to publish Trivy
  # findings to the Code Scanning tab. Without it the upload step
  # 403s with "Resource not accessible by integration".
  security-events: write

jobs:
  changelog:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      changelog: ${{ steps.cliff.outputs.content }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: cliff
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --verbose --latest --strip header
        env:
          OUTPUT: CHANGELOG.md

  publish:
    runs-on: ubuntu-latest
    needs: changelog
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/kisaesdevlab/vibe-tx-converter
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: BUILD_SHA=${{ github.sha }}
          provenance: true
          sbom: true

      - uses: actions/attest-build-provenance@v1
        with:
          subject-name: ghcr.io/kisaesdevlab/vibe-tx-converter
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      # Phase 30 #1 — keyless cosign signature using the GitHub OIDC
      # identity. Anyone can `cosign verify ghcr.io/...` against the
      # github-issued certificate without a long-lived key.
      - uses: sigstore/cosign-installer@v3
      - run: |
          cosign sign --yes \
            ghcr.io/kisaesdevlab/vibe-tx-converter@${{ steps.build.outputs.digest }}

      # Phase 30 #1 — syft SBOM attached as a sigstore attestation. The
      # docker buildx `sbom: true` flag generates a basic provenance
      # SBOM; this step adds a full-fidelity SPDX one for downstream
      # supply-chain consumers.
      - uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/kisaesdevlab/vibe-tx-converter@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json
      - run: |
          cosign attest --yes \
            --predicate sbom.spdx.json \
            --type spdxjson \
            ghcr.io/kisaesdevlab/vibe-tx-converter@${{ steps.build.outputs.digest }}

      - uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/kisaesdevlab/vibe-tx-converter@${{ steps.build.outputs.digest }}
          format: sarif
          output: trivy.sarif
          severity: CRITICAL,HIGH
          # Non-blocking for v0.1.0 first-publish — findings still
          # land in the Code Scanning tab via the upload-sarif step
          # below. Once we've audited and either patched or
          # acknowledged each finding, flip back to exit-code: '1'.
          exit-code: '0'
          ignore-unfixed: true

      - if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy.sarif

      # Phase 30 #5 — publish a GitHub Release with the generated
      # changelog and a checksum file.
      - name: Sha256 of build outputs
        run: |
          echo "${{ steps.build.outputs.digest }} ghcr.io/kisaesdevlab/vibe-tx-converter" \
            > digest.txt
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: false
          body: ${{ needs.changelog.outputs.changelog }}
          files: |
            digest.txt
            sbom.spdx.json
